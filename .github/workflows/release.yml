name: Release

# Publish packages to npm when a version tag is pushed.
#
# Package-scoped tags publish one workspace (e.g. pi-web-search-v0.1.1).
# Supported package tags: pi-vendor-v*, pi-web-search-v*, pi-image-gen-v*, pi-background-terminal-v*.
# The legacy v* tag publishes every workspace whose current version isn't already on npm.
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN needed. Each package must
# have a Trusted Publisher configured on npmjs.com pointing at this repo and
# this workflow file (.github/workflows/release.yml). Provenance attestations
# are generated automatically.
on:
  push:
    tags: ["v*", "pi-vendor-v*", "pi-web-search-v*", "pi-image-gen-v*", "pi-background-terminal-v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Trusted publishing needs npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck --workspaces --if-present
      - run: npm test
      - name: Publish package (OIDC, no token)
        run: |
          tag="${GITHUB_REF_NAME}"
          case "$tag" in
            pi-vendor-v*) packages=(packages/pi-vendor/) ;;
            pi-web-search-v*) packages=(packages/pi-web-search/) ;;
            pi-image-gen-v*) packages=(packages/pi-image-gen/) ;;
            pi-background-terminal-v*) packages=(packages/pi-background-terminal/) ;;
            v*) packages=(packages/*/) ;;
            *) echo "Unsupported release tag: $tag"; exit 1 ;;
          esac

          for dir in "${packages[@]}"; do
            name=$(node -p "require('./${dir}package.json').name")
            ver=$(node -p "require('./${dir}package.json').version")
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "✓ ${name}@${ver} already on npm — skipping"
            else
              echo "→ publishing ${name}@${ver}"
              npm publish -w "${name}" --access public
            fi
          done
