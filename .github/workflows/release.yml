name: Release

# Publish packages to npm when a version tag (e.g. v0.1.0) is pushed.
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN needed. Each package must
# have a Trusted Publisher configured on npmjs.com pointing at this repo and
# this workflow file (.github/workflows/release.yml). Provenance attestations
# are generated automatically. Each package is published only if its current
# version isn't already on npm, so re-tagging or bumping one package is safe.
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Trusted publishing needs npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck --workspaces --if-present
      - run: npm test
      - name: Publish changed packages (OIDC, no token)
        run: |
          for dir in packages/*/; do
            name=$(node -p "require('./${dir}package.json').name")
            ver=$(node -p "require('./${dir}package.json').version")
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "✓ ${name}@${ver} already on npm — skipping"
            else
              echo "→ publishing ${name}@${ver}"
              npm publish -w "${name}"
            fi
          done
