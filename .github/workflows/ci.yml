name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Web assets must be built and committed/generated clean before pack smoke.
      - run: npm --workspace @bytetrue/pi-vendor run build:web
      - name: Generated web assets clean
        run: |
          if [ -n "$(git status --porcelain -- packages/pi-vendor/src/web/assets)" ]; then
            echo "Generated web assets dirty after build:web:"
            git status --porcelain -- packages/pi-vendor/src/web/assets
            exit 1
          fi
      # Type-check any workspace that defines a `typecheck` script.
      - run: npm run typecheck --workspaces --if-present
      # Run every workspace's test suite (vitest).
      - run: npm test
      # Each distributable package must build, pack, and load after a production-only install.
      - run: node packages/pi-vendor/scripts/pack-smoke.mjs
      - run: node packages/pi-image-gen/scripts/pack-smoke.mjs